<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>O:Pocket - My Events</title>
    <link rel="stylesheet" th:href="@{/css/profile.css}">
    <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
</head>
<body>
<nav class="navbar">
    <div class="logo">O:Pocket</div>
    <ul class="nav-links">
        <li><a th:href="@{/feed}">Races</a></li>
        <li><a th:href="@{/profile}" class="btn-link">Profile</a></li>
        <li><a th:href="@{/logout}" class="btn-link">Log out</a></li>
    </ul>
</nav>

<main class="main-container">
    <div class="right-column" style="margin: auto; max-width: 800px; width: 100%;">
        <div class="content-box">
            <h3 class="box-title">My Organized Events</h3>
            <div class="history-list">
                <div th:each="event : ${events}" class="history-row">
                    <div class="date-container small-date">
                        <span class="day" th:text="${#temporals.day(event.date)}">15</span>
                        <span class="month" th:text="${#temporals.monthNameShort(event.date)}">NOV</span>
                    </div>
                    <div class="race-info">
                        <h4 th:text="${event.name}">Event Name</h4>
                        <p th:text="${event.location} + ' • ' + ${event.mapName}">Location • Map</p>
                    </div>
                    <div class="join-race-btn-container">
                        <a th:href="@{/event/edit(eventId=${event.id})}" class="main-btn" style="text-decoration:none;">Manage</a>
                    </div>
                </div>
                <div th:if="${events.isEmpty()}">
                    <p>You have not created any events yet.</p>
                </div>
            </div>
        </div>
    </div>
</main>

<footer class="footer">
    <div class="footer-container">
        <div class="footer-bottom">
            <p>&copy; 2025 O:Pocket. All rights reserved.</p>
        </div>
    </div>
</footer>
</body>
</html>
