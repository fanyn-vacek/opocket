<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>O:Pocket - Edit Event</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
</head>
<body>
<main class="main-container">
    <div class="login-box" style="max-width: 500px;">
        <div class="box-header">
            <h2>Edit Event</h2>
        </div>

        <form th:action="@{/event/edit}" method="post" th:object="${event}">
            <input type="hidden" th:field="*{id}" />
            <div class="input-field-usr">
                <label>Event Name</label>
                <input type="text" th:field="*{name}" required>
            </div>
            <div class="input-field-usr">
                <label>Location</label>
                <input type="text" th:field="*{location}" required>
            </div>
            <div class="input-field-usr">
                <label>Date</label>
                <input type="date" th:field="*{date}" required>
            </div>
            <div class="input-field-usr">
                <label>Map Name</label>
                <input type="text" th:field="*{mapName}">
            </div>

            <button type="submit" class="login-button">Save Changes</button>
        </form>

        <div style="margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px;">
            <h3>Defined Categories</h3>
            <ul style="list-style: none; padding: 0; margin-top: 10px;">
                <li th:each="category : ${event.categories}"
                    th:text="${category.name} + ' (' + ${category.length} + ' km, ' + ${category.climbing} + ' m)'"
                    style="background-color: #f9f9f9; padding: 8px 12px; border-radius: 5px; margin-bottom: 5px;">
                </li>
                <li th:if="${event.categories.isEmpty()}">
                    <p>No categories defined yet.</p>
                </li>
            </ul>
            <a th:href="@{/event/categories(eventId=${event.id})}" class="login-button" style="text-decoration: none; margin-top: 15px; background-color: #6c757d;">Add / Manage Categories</a>
        </div>

        <a th:href="@{/my-events}" style="display:block; text-align:center; margin-top:30px; color:#666; text-decoration:none; font-size: 14px;">
            Back to My Events
        </a>
    </div>
</main>
</body>
</html>
